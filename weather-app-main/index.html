<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SkyCast | Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="weatherBackground"></div>
<div id="rainContainer"></div>


<div class="container">

    
<div class="header">

    <h1 class="logo">
        ⛅ SkyCast
    </h1>

    <p class="tagline">
        Real-Time Weather Dashboard
    </p>

</div>

    <div class="top-bar">

        <input
            id="city"
            type="text"
            placeholder="Search city..."
        >

        <button
            id="searchBtn"
            title="Search Weather">
            Get Weather
        </button>

        <button
            id="locationBtn"
            title="Current Location">
            📍
        </button>
<!-- 
        <button
            id="themeBtn"
            title="Toggle Theme">
            🌙
        </button> -->

    </div>

    <div id="loader">

        <div class="spinner"></div>

        <p>Loading weather...</p>

    </div>

    <h2 id="cityName"></h2>

<div class="dashboard">

    <!-- Left Side -->
    <div class="left-panel">

        <div class="text-blur">
            <div id="current"></div>
            <div id="sunInfo"></div>
           
        </div>

    </div>

    <!-- Right Side -->
    <div class="right-panel">

        <div class="text-blur">

            <div class="chart-title">
                🌡 Temperature Trend
            </div>

            <div class="chart-container">
                <canvas id="tempChart"></canvas>
            </div>
             <div id="aqiInfo"></div>

        </div>

    </div>

</div>

<div class="hourly-section">

    <h3>⏰ Next 24 Hours</h3>

    <div id="hourlyForecast"></div>

</div>

<div class="forecast-section">

    <h3>📅 5-Day Forecast</h3>

    <div id="forecast"></div>

</div>
<!-- Recent Searches -->

<div class="history-section">

    <h3>🕘 Recent Searches</h3>

    <div id="historyList"></div>

</div>

<footer class="footer">

    <p class="footer-title">

        ⛅ SkyCast v1.0

    </p>

    <p class="footer-text">

        Built with ❤️ using HTML • CSS • JavaScript • OpenWeather API • Chart.js

    </p>

    <p class="footer-copy">

        © 2026 Rishabhpatidar

    </p>

</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>

</html>
